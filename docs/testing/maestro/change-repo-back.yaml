# TC-RC-04 — «Назад» с выбора репозитория и ввода URL возвращает в Настройки
appId: app.obsidianmd
---
- clearState
- launchApp
# ждём отрисовку приветствия с запасом — холодный старт после clearState может рисоваться дольше
# дефолтного таймаута assertVisible
- extendedWaitUntil:
    visible: ".*Welcome to Brainer.*"
    timeout: 20000
- tapOn: ".*Use locally.*"
- tapOn: "Settings"
# --- Путь «Enter manually» ---
- tapOn: "Change repository"
- tapOn: "Enter manually"
- assertVisible: ".*Enter a repository URL.*"   # экран ManualUrl
- tapOn: "Back"                                  # стрелка «назад» в топбаре
- assertVisible: "Current repository"            # вернулись в Настройки
# --- Путь «GitHub» (пикер репозиториев) ---
- tapOn: "Change repository"
- tapOn: "GitHub"
- assertVisible: ".*Choose a repository.*"       # экран RepoPicker (заголовок виден сразу, до загрузки)
- tapOn: "Back"                                  # стрелка «назад» в топбаре
- assertVisible: "Current repository"            # снова вернулись в Настройки
